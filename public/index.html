<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мемчики — NLauncher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0f;
      --surface: rgba(255,255,255,0.03);
      --surface-hover: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --accent: #00d4aa;
      --accent-dim: #00a884;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --glow: rgba(0,212,170,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, var(--glow), transparent),
        linear-gradient(180deg, var(--bg) 0%, #0f0f14 100%);
    }
    .wrap { max-width: 560px; margin: 0 auto; padding: 32px 20px; }
    header {
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      font-family: 'Unbounded', sans-serif;
      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .badge {
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    a.badge:hover { color: var(--accent); border-color: var(--accent-dim); }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      transition: border-color 0.2s, background 0.2s;
    }
    .card:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.12); }
    .card h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .drop-zone {
      position: relative;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent-dim);
      background: rgba(0,212,170,0.04);
    }
    .file-input-hidden {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .drop-zone .icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .drop-zone .hint {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .drop-zone .hint strong { color: var(--accent); }
    .drop-zone.has-file .icon { background: rgba(0,212,170,0.1); border-color: var(--accent-dim); }
    .drop-zone .preview {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      object-fit: contain;
      margin-top: 8px;
    }
    .drop-zone .filename {
      font-size: 0.8rem;
      color: var(--accent);
      word-break: break-all;
    }
    .field {
      margin-bottom: 16px;
    }
    .field:last-of-type { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 0.9rem;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      transition: border-color 0.2s;
    }
    .field input::placeholder { color: var(--text-muted); opacity: 0.7; }
    .field input:focus {
      outline: none;
      border-color: var(--accent-dim);
    }
    .btn {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      color: #0b0b0f;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--glow);
    }
    .btn-primary:active { transform: translateY(0); }
    .feed-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .feed-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    #feed { display: flex; flex-direction: column; gap: 20px; }
    .meme-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
    }
    .meme-card:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.12); }
    .meme-card img {
      width: 100%;
      display: block;
      vertical-align: middle;
    }
    .meme-card .meta {
      padding: 14px 18px;
      font-size: 0.85rem;
    }
    .meme-card .top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .meme-card .nick {
      color: var(--accent);
      font-weight: 600;
    }
    .meme-card .date { color: var(--text-muted); font-size: 0.8rem; }
    .meme-card .caption { color: var(--text-muted); line-height: 1.45; }
    .loading { text-align: center; color: var(--text-muted); padding: 40px 20px; font-size: 0.9rem; }
    .error { color: #f87171; padding: 16px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="logo">Мемчики</span>
      <span class="badge">NLauncher</span>
      <a href="/admin" class="badge" style="margin-left:auto;text-decoration:none;color:var(--text-muted);">Админ-панель</a>
    </header>

    <div class="card">
      <h2>Новый мем</h2>
      <form id="form" action="/api/memes" method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required id="fileInput" class="file-input-hidden">
        <div class="drop-zone" id="dropZone" role="button" tabindex="0">
          <div class="icon" id="zoneIcon">📷</div>
          <span class="hint" id="zoneHint"><strong>Перетащи сюда</strong> или нажми, чтобы выбрать файл</span>
          <img class="preview" id="preview" alt="" hidden>
          <span class="filename" id="filename" hidden></span>
        </div>
        <div class="field">
          <label for="nickname">Твой ник</label>
          <input type="text" id="nickname" name="nickname" placeholder="Как к тебе обращаться" maxlength="64">
        </div>
        <div class="field">
          <label for="caption">Подпись</label>
          <input type="text" id="caption" name="caption" placeholder="Что-то смешное" maxlength="256">
        </div>
        <button type="submit" class="btn btn-primary">Отправить</button>
      </form>
    </div>

    <h2 class="feed-title">Лента</h2>
    <div id="feed">
      <div class="loading">Загрузка…</div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const zoneHint = document.getElementById('zoneHint');
    const zoneIcon = document.getElementById('zoneIcon');
    const filenameEl = document.getElementById('filename');
    const feed = document.getElementById('feed');
    const nicknameInput = document.getElementById('nickname');

    (function prefillAdminNick() {
      var username = localStorage.getItem('memesite_admin_username') || sessionStorage.getItem('memesite_admin_username');
      if (username && nicknameInput) nicknameInput.value = username;
    })();

    (function () {
      var dialogOpen = false;
      function openFileDialog() {
        if (dialogOpen) return;
        dialogOpen = true;
        fileInput.click();
        var cleared = false;
        function clearFlag() {
          if (cleared) return;
          cleared = true;
          dialogOpen = false;
        }
        fileInput.addEventListener('change', clearFlag, { once: true });
        setTimeout(clearFlag, 800);
      }
      dropZone.addEventListener('mousedown', function (e) {
        e.preventDefault();
        openFileDialog();
      });
      dropZone.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openFileDialog();
        }
      });
    })();

    ['dragenter', 'dragover'].forEach(ev => {
      dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    });
    ['dragleave', 'drop'].forEach(ev => {
      dropZone.addEventListener(ev, (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (ev === 'drop' && e.dataTransfer.files.length) {
          fileInput.files = e.dataTransfer.files;
          updatePreview();
        }
      });
    });

    fileInput.addEventListener('change', updatePreview);

    function updatePreview() {
      const file = fileInput.files[0];
      if (!file) {
        dropZone.classList.remove('has-file');
        preview.hidden = true;
        filenameEl.hidden = true;
        zoneHint.hidden = false;
        zoneIcon.hidden = false;
        return;
      }
      dropZone.classList.add('has-file');
      zoneHint.hidden = true;
      zoneIcon.hidden = true;
      filenameEl.textContent = file.name;
      filenameEl.hidden = false;
      preview.hidden = false;
      const r = new FileReader();
      r.onload = () => { preview.src = r.result; };
      r.readAsDataURL(file);
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleString('ru-RU', {
        day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function render(memes) {
      if (memes.length === 0) {
        feed.innerHTML = '<p class="loading">Пока пусто. Будь первым!</p>';
        return;
      }
      feed.innerHTML = memes.map(m => `
        <article class="meme-card">
          <img src="${m.imageUrl}" alt="" loading="lazy">
          <div class="meta">
            <div class="top">
              <span class="nick">${escapeHtml(m.nickname)}</span>
              <span class="date">${formatDate(m.date)}</span>
            </div>
            ${m.caption ? `<div class="caption">${escapeHtml(m.caption)}</div>` : ''}
          </div>
        </article>
      `).join('');
    }
    function loadFeed() {
      fetch('/api/memes').then(r => r.json()).then(render).catch(() => {
        feed.innerHTML = '<p class="error">Не удалось загрузить ленту.</p>';
      });
    }
    loadFeed();

    document.getElementById('form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const file = fileInput.files[0];
      if (!file) return;
      const btn = this.querySelector('button[type="submit"]');
      const origText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Отправка…';
      try {
        const fd = new FormData();
        fd.append('image', file);
        const up = await fetch('/api/upload', { method: 'POST', body: fd });
        const upJson = await up.json();
        if (!up.ok || !upJson.imageUrl) {
          throw new Error(upJson.error || 'Ошибка загрузки');
        }
        const mem = await fetch('/api/memes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            imageUrl: upJson.imageUrl,
            nickname: document.getElementById('nickname').value.trim() || 'Аноним',
            caption: document.getElementById('caption').value.trim()
          })
        });
        if (!mem.ok) throw new Error('Ошибка сохранения');
        fileInput.value = '';
        updatePreview();
        this.reset();
        document.getElementById('caption').value = '';
        var adminUser = localStorage.getItem('memesite_admin_username') || sessionStorage.getItem('memesite_admin_username');
        document.getElementById('nickname').value = adminUser ? adminUser : '';
        loadFeed();
      } catch (err) {
        feed.innerHTML = '<p class="error">' + escapeHtml(err.message) + '</p>';
        setTimeout(loadFeed, 3000);
      }
      btn.disabled = false;
      btn.textContent = origText;
    });
  </script>
</body>
</html>
